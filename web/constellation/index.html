<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>✨ Constellation Composer</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .svg-container {
            background: #0a0a2e;
            border-radius: var(--radius);
            border: 1px solid var(--border-subtle);
            box-shadow: 0 0 40px rgba(74, 111, 165, 0.15), var(--shadow);
            overflow: hidden;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        .svg-container svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .constellation-name {
            text-align: center;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 2rem;
            letter-spacing: 0.15em;
            color: #c8d6e5;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(74, 111, 165, 0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1.5rem;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .mythology-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .mythology-panel h3 {
            color: var(--accent-teal);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
        }

        .mythology-panel p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.7;
        }

        .mythology-panel p:last-child {
            margin-bottom: 0;
        }

        .mythology-culture {
            color: var(--accent-pink) !important;
            font-style: italic;
        }

        .mythology-moral {
            border-left: 3px solid var(--accent-purple);
            padding-left: 1rem;
            font-style: italic;
        }

        .mythology-viewing {
            color: var(--text-dim) !important;
            font-size: 0.9rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .input-section {
            margin-bottom: 1.5rem;
        }

        .input-section .text-input {
            font-size: 1.1rem;
            padding: 1rem 1.25rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--accent-teal);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="../">← Home</a>
        </nav>

        <header class="page-header">
            <h1>✨ Constellation Composer</h1>
            <p>Type a sentence and watch the stars align</p>
        </header>

        <div id="loading" class="loading">Loading star charts…</div>

        <div id="app" style="display: none;">
            <div class="input-section">
                <input type="text" id="textInput" class="text-input"
                       placeholder="Type a sentence and watch the stars align..."
                       autocomplete="off" spellcheck="false">
            </div>

            <div id="result" style="display: none;">
                <div id="constellationName" class="constellation-name"></div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="starCount">0</div>
                        <div class="stat-label">Stars</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="edgeCount">0</div>
                        <div class="stat-label">Connections</div>
                    </div>
                </div>

                <div class="svg-container" id="svgContainer"></div>

                <div class="actions">
                    <button class="btn btn-primary" id="downloadBtn">⬇ Download SVG</button>
                    <button class="btn btn-secondary" id="shareBtn">🔗 Share</button>
                </div>

                <div class="mythology-panel" id="mythologyPanel">
                    <h3>Origin Culture</h3>
                    <p class="mythology-culture" id="mythCulture"></p>

                    <h3>The Story</h3>
                    <p id="mythStory"></p>

                    <h3>Wisdom</h3>
                    <p class="mythology-moral" id="mythMoral"></p>

                    <h3>Best Viewing</h3>
                    <p class="mythology-viewing" id="mythViewing"></p>
                </div>
            </div>

            <div id="emptyState" class="empty-state">
                <div class="icon">🌌</div>
                <p>Enter any text above to generate your unique constellation</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../shared/wasm_exec.js"></script>
    <script src="../shared/common.js"></script>
    <script src="app.js"></script>
</body>
</html>
