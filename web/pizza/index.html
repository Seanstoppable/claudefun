<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>🍕 Infinite Pizza Generator</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    :root {
      --pizza-red: #e74c3c;
      --pizza-gold: #f39c12;
      --pizza-warm: #e67e22;
      --pizza-cream: #fdebd0;
      --pizza-dark-red: #922b21;
    }

    .page-header {
      border-color: var(--pizza-red);
      background: linear-gradient(180deg, rgba(231,76,60,0.08) 0%, var(--bg-secondary) 100%);
    }

    .page-header h1 {
      background: linear-gradient(135deg, var(--pizza-gold), var(--pizza-red), var(--pizza-warm));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2.4rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .btn-pizza {
      background: linear-gradient(135deg, var(--pizza-red), var(--pizza-warm));
      color: white;
      font-size: 1.2rem;
      padding: 1rem 2rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-family: var(--font-main);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-pizza::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.5s ease, height 0.5s ease;
    }

    .btn-pizza:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 30px rgba(231,76,60,0.5);
    }

    .btn-pizza:hover::before {
      width: 300px; height: 300px;
    }

    .btn-pizza:active {
      transform: translateY(-1px) scale(0.98);
    }

    .btn-pizza.spinning .pizza-icon {
      animation: pizza-spin 0.6s ease-out;
    }

    @keyframes pizza-spin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.3); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .btn-menu {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 2px solid var(--pizza-gold);
      font-size: 1rem;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      font-family: var(--font-main);
      transition: all 0.3s ease;
    }

    .btn-menu:hover {
      background: rgba(243,156,18,0.1);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(243,156,18,0.3);
    }

    .btn-menu.active {
      background: var(--pizza-gold);
      color: var(--bg-primary);
    }

    /* Recipe Card */
    .recipe-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 0;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: card-appear 0.5s ease-out;
      border-top: 3px solid var(--pizza-red);
    }

    @keyframes card-appear {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .recipe-card-body {
      padding: 1.5rem 2rem;
    }

    .pizza-name {
      font-size: 1.8rem;
      font-weight: 800;
      text-align: center;
      padding: 1.5rem 2rem 1rem;
      background: linear-gradient(135deg, var(--pizza-gold), var(--pizza-warm));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-style: italic;
      line-height: 1.3;
    }

    .course-label {
      text-align: center;
      color: var(--pizza-red);
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding-top: 1.5rem;
    }

    /* Ingredients */
    .ingredient-section {
      margin-bottom: 0.5rem;
    }

    .ingredient-label {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      min-width: 70px;
      text-align: center;
      margin-right: 0.75rem;
    }

    .label-base { background: rgba(243,156,18,0.15); color: var(--pizza-gold); }
    .label-sauce { background: rgba(231,76,60,0.15); color: var(--pizza-red); }
    .label-cheese { background: rgba(255,215,0,0.15); color: #ffd700; }
    .label-protein { background: rgba(230,126,34,0.15); color: var(--pizza-warm); }
    .label-topping { background: rgba(32,178,170,0.15); color: var(--accent-teal); }
    .label-garnish { background: rgba(255,105,180,0.15); color: var(--accent-pink); }
    .label-drizzle { background: rgba(125,86,244,0.15); color: var(--accent-purple); }

    .ingredient-row {
      display: flex;
      align-items: baseline;
      padding: 0.4rem 0;
    }

    .ingredient-info {
      flex: 1;
    }

    .ingredient-name {
      font-weight: 700;
      color: var(--text-primary);
    }

    .ingredient-desc {
      color: var(--text-dim);
      font-style: italic;
      font-size: 0.9rem;
      margin-top: 0.15rem;
    }

    .ingredient-flavor {
      font-size: 0.75rem;
      color: var(--text-secondary);
      opacity: 0.7;
      margin-left: 0.5rem;
    }

    .section-divider {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 1rem 0;
    }

    /* Tasting Notes */
    .tasting-section {
      margin-top: 0.5rem;
    }

    .section-title {
      color: var(--pizza-gold);
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .tasting-note {
      border-left: 3px solid var(--pizza-warm);
      padding: 0.75rem 1rem;
      background: rgba(230,126,34,0.05);
      border-radius: 0 8px 8px 0;
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .pairing {
      padding: 0.5rem 0;
      color: var(--text-secondary);
    }

    .pairing-icon { margin-right: 0.5rem; }

    .chef-quote {
      padding: 0.5rem 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    .chef-quote-icon { margin-right: 0.5rem; font-style: normal; }

    /* Pretension Meter */
    .pretension-section {
      margin-top: 0.75rem;
    }

    .pretension-bar-container {
      background: var(--bg-secondary);
      border-radius: 20px;
      height: 24px;
      overflow: hidden;
      position: relative;
      margin-top: 0.5rem;
      border: 1px solid var(--border-subtle);
    }

    .pretension-bar {
      height: 100%;
      border-radius: 20px;
      transition: width 1s ease-out;
      background: linear-gradient(90deg,
        #27ae60 0%,
        #f39c12 40%,
        #e74c3c 70%,
        #8e44ad 100%
      );
      position: relative;
    }

    .pretension-bar::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.1) 50%,
        transparent 100%
      );
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .pretension-rating-text {
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    /* Seed & Share */
    .seed-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1rem;
      padding: 0.75rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      font-size: 0.85rem;
      flex-wrap: wrap;
    }

    .seed-value {
      font-family: var(--font-mono);
      color: var(--text-secondary);
    }

    .btn-share {
      background: none;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: var(--font-main);
      transition: all 0.2s;
    }

    .btn-share:hover {
      border-color: var(--pizza-gold);
      color: var(--pizza-gold);
    }

    .btn-share.copied {
      border-color: #27ae60;
      color: #27ae60;
    }

    /* Loading State */
    .loading-pizza {
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
    }

    .loading-pizza .pizza-bounce {
      font-size: 3rem;
      display: inline-block;
      animation: bounce 0.6s ease infinite alternate;
    }

    @keyframes bounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-15px); }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-dim);
    }

    .empty-state .big-emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }

    .empty-state p {
      font-size: 1.1rem;
    }

    /* Menu mode */
    .menu-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .course-count {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .course-count label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .course-count select {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      font-family: var(--font-main);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .course-count select:focus {
      outline: none;
      border-color: var(--pizza-gold);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .pizza-name { font-size: 1.3rem; }
      .recipe-card-body { padding: 1rem; }
      .ingredient-row { flex-direction: column; gap: 0.25rem; }
      .ingredient-label { margin-bottom: 0.25rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="../">← All Projects</a>
    </nav>

    <header class="page-header">
      <h1>🍕 Infinite Pizza Generator</h1>
      <p>Artisanal, algorithmically-curated pizza recipes with sommelier-grade pretension</p>
    </header>

    <div class="controls">
      <button id="generate-btn" class="btn-pizza" disabled>
        <span class="pizza-icon">🍕</span> Generate Pizza
      </button>
      <button id="menu-toggle" class="btn-menu">
        📋 Tasting Menu
      </button>
    </div>

    <div id="menu-controls" class="menu-controls" style="display:none;">
      <div class="course-count">
        <label for="course-count">Courses:</label>
        <select id="course-count">
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>
    </div>

    <div id="output">
      <div class="empty-state" id="empty-state">
        <span class="big-emoji">🍕</span>
        <p>Press the button to generate an absurdly pretentious pizza</p>
      </div>
    </div>

    <div id="loading" class="loading-pizza" style="display:none;">
      <span class="pizza-bounce">🍕</span>
      <p>Consulting the pizza oracle…</p>
    </div>
  </div>

  <script src="../shared/wasm_exec.js"></script>
  <script src="../shared/common.js"></script>
  <script src="app.js"></script>
</body>
</html>
